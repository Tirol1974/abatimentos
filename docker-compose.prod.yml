services:
  postgres:
    image: postgres:16-alpine
    container_name: abatimentos-postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    env_file:
      - .prod.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
  api:
    build:
      context: ./api
      target: prod
    container_name: abatimentos-api-prod
    restart: always
    ports:
      - "3333"
    env_file:
      - ./api/.prod.env
    volumes:
      - /opt/abatimentos/uploads:/usr/src/app/uploads
      - /opt/abatimentos/google/recaptcha-auth.json:/run/secrets/recaptcha-auth.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
      - reverse-proxy
  web:
    build:
      context: ./web
      target: prod
    container_name: abatimentos-web
    expose:
      - "3000"
    restart: always
    env_file:
      - ./web/.env
    networks:
      - app-network
      - reverse-proxy

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
  reverse-proxy:
    external: true
