services:
  postgres:
    image: postgres:16-alpine
    container_name: abatimentos-postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    env_file:
      - .prod.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
  api:
    build:
      context: ./api
      target: prod
    container_name: abatimentos-api-prod
    restart: always
    ports:
      - "3333"
    env_file:
      - ./api/.env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/recaptcha-auth.json
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"fetch('http://localhost:3333/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - /opt/abatimentos/uploads:/usr/src/app/uploads
      - /opt/abatimentos/google/recaptcha-auth.json:/run/secrets/recaptcha-auth.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
      - reverse-proxy
  web:
    build:
      context: ./web
      target: prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://abatimentos.tirol.com.br/api}
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-6LdgZ18tAAAAANL5DzBVFOMQ7ZjlV56H3uLmll3u}
    container_name: abatimentos-web
    expose:
      - "3000"
    restart: always
    env_file:
      - ./web/.env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network
      - reverse-proxy

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
  reverse-proxy:
    external: true
