services:
  postgres:
    image: postgres:16-alpine
    container_name: abatimentos-postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    env_file:
      - .prod.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
  api:
    build:
      context: ./api
      target: prod
    container_name: abatimentos-api-prod
    ports:
      - "3333:3333"
    env_file:
      - ./api/.env
    environment:
      - NODE_ENV=${NODE_ENV}
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
  web:
    build:
      context: ./web
      target: prod
    container_name: abatimentos-web
    expose:
      - "3000"
    restart: always
    env_file:
      - ./web/.env
    networks:
      - app-network
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
    - web
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
