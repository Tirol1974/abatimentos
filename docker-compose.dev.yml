services:
  postgres:
    image: postgres:16-alpine
    container_name: abatimentos-postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
  api:
    build:
      context: ./api
      target: dev
    container_name: abatimentos-api-dev
    ports:
      - "3333:3333"
    env_file:
      - ./api/.env
    environment:
      - NODE_ENV=${NODE_ENV}
      - CHOKIDAR_USEPOLLING=true
      - GOOGLE_APPLICATION_CREDENTIALS=/usr/src/app/recaptcha-auth.json
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"fetch('http://localhost:3333/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
      - ./uploads:/usr/src/app/uploads
      - ./google/recaptcha-auth.json:/usr/src/app/recaptcha-auth.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres_data:  

networks:
  app-network:
    driver: bridge
